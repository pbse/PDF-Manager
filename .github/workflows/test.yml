name: Test
on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    name: Test (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Node.js setup
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install UI dependencies
        run: npm install --prefix src/ui --legacy-peer-deps

      - name: Run Svelte Check
        run: npm run check
        working-directory: src/ui

      - name: Run Backend Tests
        run: cargo test
        working-directory: src-tauri

      - name: Run Frontend Unit Tests
        run: npm run test:ui
        working-directory: src/ui

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: src/ui

      - name: Run E2E Tests
        run: npm run test:e2e
        working-directory: src/ui
        env:
          CI: true

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.platform }}
          path: src/ui/playwright-report/
          retention-days: 30
